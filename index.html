          "@type": "Answer",

        "@type": "Question",
        "name": "What is Constraints AI?",

          "@type": "Answer",

        "@type": "Question",

  <style>
    /* TOKENS . v3 WOW . cinematic dark */
    :root {
      --ink:        #0A0E14;
      --ink-2:      #0F141C;
      --ink-3:      #161D27;
      --paper:      #F5EFE2;
      --paper-2:    #E8DFCB;
      --amber:      #E8A66B;
      --amber-2:    #D08A50;
      --clay:       #B47C57;
      --rust:       #C95F4D;
      --cyan:       #5BC0BE;
      --line:       rgba(245,239,226,0.12);
      --line-2:     rgba(245,239,226,0.06);
      --t-mid:      rgba(245,239,226,0.78);
      --t-muted:    rgba(245,239,226,0.55);
      --t-dim:      rgba(245,239,226,0.35);
      --serif:      'Spectral', Georgia, serif;
      --sans:       'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --mono:       'JetBrains Mono', ui-monospace, monospace;
      --ease:       cubic-bezier(0.22, 1, 0.36, 1);
      --shadow:     0 24px 64px rgba(0,0,0,0.5);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--sans);
      background: var(--ink);
      color: var(--paper);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    img { max-width: 100%; display: block; }
    ::selection { background: rgba(232,166,107,0.28); color: var(--paper); }

    /* NAV */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      padding: 16px 32px;
      background: rgba(10,14,20,0); backdrop-filter: blur(0);
      transition: background 300ms var(--ease), backdrop-filter 300ms var(--ease), border-color 300ms;
      border-bottom: 1px solid transparent;
    }
    .nav.scrolled {
      background: rgba(10,14,20,0.78);
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
      border-bottom-color: var(--line-2);
    }
    .nav-inner { max-width: 1320px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .brand { display: inline-flex; align-items: center; gap: 12px; font-weight: 700; letter-spacing: -0.01em; font-size: 16px; color: var(--paper); }
    .brand img { width: 32px; height: 32px; border-radius: 50%; }
    .brand .accent { color: var(--amber); }
    .nav-links { display: flex; gap: 28px; align-items: center; }
    .nav-links a { font-size: 13px; color: var(--t-muted); transition: color 180ms; font-weight: 500; }
    .nav-links a:hover { color: var(--paper); }
    .nav-cta {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 18px; border-radius: 999px;
      background: var(--paper); color: var(--ink);
      font-weight: 600; font-size: 13px;
      transition: transform 180ms var(--ease), box-shadow 220ms;
    }
    .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(245,239,226,0.16); }
    .nav-cta::after { content: '→'; font-weight: 400; }
    @media (max-width: 760px) {
      .nav-links { display: none; }
      .nav { padding: 12px 18px; }
    }

    /* HERO */
    .hero {
      position: relative;
      min-height: 100vh;
      padding: 140px 32px 64px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px;
      max-width: 1480px;
      margin: 0 auto;
      align-items: center;
    }
    @media (max-width: 980px) { .hero { grid-template-columns: 1fr; gap: 40px; padding: 120px 20px 48px; } }

    #constellation {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      opacity: 0.85;
    }
    .hero, .nav, main { position: relative; z-index: 1; }

    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 10px;
      font-family: var(--mono); font-size: 11.5px;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--amber); margin-bottom: 28px;
    }
    .hero-eyebrow::before {
      content: ''; display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--amber);
      box-shadow: 0 0 14px var(--amber);
      animation: blink 2.4s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .hero h1 {
      font-family: var(--serif);
      font-size: clamp(40px, 6.4vw, 84px);
      line-height: 0.98;
      letter-spacing: -0.035em;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--paper);
    }
    .hero h1 em {
      font-style: italic;
      color: var(--amber);
      font-weight: 600;
    }
    .hero-sub {
      font-size: clamp(16px, 1.6vw, 19px);
      color: var(--t-mid);
      max-width: 460px;
      margin-bottom: 36px;
      line-height: 1.6;
    }
    .hero-meta {
      display: flex; gap: 20px; flex-wrap: wrap;
      font-family: var(--mono); font-size: 11.5px;
      color: var(--t-muted); letter-spacing: 0.04em;
    }
    .hero-meta span { display: inline-flex; align-items: center; gap: 7px; }
    .hero-meta span::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--amber); }

    /* DEMO PANEL */
    .demo {
      position: relative;
      background: linear-gradient(180deg, rgba(22,29,39,0.78) 0%, rgba(15,20,28,0.92) 100%);
      backdrop-filter: blur(20px) saturate(1.2);
      -webkit-backdrop-filter: blur(20px) saturate(1.2);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .demo::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at top right, rgba(232,166,107,0.10), transparent 60%);
      pointer-events: none;
    }
    .demo-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px; position: relative;
    }
    .demo-title {
      font-family: var(--mono); font-size: 11px;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--t-muted);
      display: flex; align-items: center; gap: 8px;
    }
    .demo-title::before {
      content: ''; width: 8px; height: 8px; border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 12px var(--cyan);
    }
    .demo-quota {
      font-family: var(--mono); font-size: 10.5px;
      color: var(--t-dim); letter-spacing: 0.06em;
    }
    .demo-quota strong { color: var(--amber); font-weight: 500; }

    .demo-prompt-label {
      font-size: 13px; color: var(--t-mid);
      margin-bottom: 10px; font-weight: 500;
    }
    .demo textarea {
      width: 100%;
      background: rgba(245,239,226,0.04);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px 16px;
      font-family: var(--sans); font-size: 15px;
      color: var(--paper);
      resize: vertical;
      min-height: 88px;
      outline: none;
      transition: border-color 180ms, background 180ms;
      line-height: 1.5;
    }
    .demo textarea::placeholder { color: var(--t-dim); }
    .demo textarea:focus {
      border-color: var(--amber);
      background: rgba(245,239,226,0.06);
    }
    .demo-actions {
      display: flex; gap: 10px; align-items: center;
      margin-top: 12px;
    }
    .demo-submit {
      flex: 1;
      padding: 13px 22px; border-radius: 10px;
      background: var(--paper); color: var(--ink);
      font-weight: 600; font-size: 14.5px;
      transition: transform 180ms var(--ease), box-shadow 220ms, background 220ms;
      display: inline-flex; align-items: center; justify-content: center; gap: 9px;
    }
    .demo-submit:hover { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(245,239,226,0.18); }
    .demo-submit:disabled { background: var(--ink-3); color: var(--t-muted); cursor: wait; transform: none; box-shadow: none; }
    .demo-submit .arr { display: inline-block; transition: transform 220ms var(--ease); }
    .demo-submit:hover .arr { transform: translateX(3px); }
    .demo-hint {
      margin-top: 12px; font-size: 12px; color: var(--t-dim);
      font-family: var(--mono); letter-spacing: 0.02em;
    }
    .demo-hint kbd {
      background: rgba(245,239,226,0.08);
      padding: 2px 6px; border-radius: 4px;
      font-size: 10.5px; color: var(--paper);
    }

    /* streaming output */
    .demo-out {
      display: none;
      margin-top: 22px;
      border-top: 1px solid var(--line);
      padding-top: 22px;
    }
    .demo-out.show { display: block; animation: fadeUp 600ms var(--ease); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .out-row {
      margin-bottom: 18px; padding-bottom: 18px;
      border-bottom: 1px dashed var(--line-2);
    }
    .out-row:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
    .out-label {
      font-family: var(--mono); font-size: 10.5px;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--amber); margin-bottom: 8px;
      font-weight: 500;
    }
    .out-content {
      font-family: var(--serif); font-size: 18px;
      color: var(--paper); line-height: 1.45; letter-spacing: -0.005em;
    }
    .out-list {
      list-style: none; padding: 0;
    }
    .out-list li {
      font-family: var(--sans); font-size: 14.5px;
      color: var(--t-mid); line-height: 1.55;
      padding-left: 18px; position: relative;
      margin-bottom: 6px;
    }
    .out-list li::before {
      content: '→'; position: absolute; left: 0;
      color: var(--amber);
    }
    .out-action {
      font-family: var(--sans); font-size: 14.5px;
      color: var(--paper); line-height: 1.55;
      padding: 12px 14px; border-left: 2px solid var(--amber);
      background: rgba(232,166,107,0.06);
      border-radius: 0 6px 6px 0;
    }
    .out-cta {
      margin-top: 22px;
      padding: 16px 18px; border-radius: 10px;
      background: linear-gradient(135deg, rgba(232,166,107,0.10), rgba(180,124,87,0.04));
      border: 1px solid rgba(232,166,107,0.22);
      display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    }
    .out-cta-text {
      font-size: 13.5px; color: var(--t-mid); flex: 1; min-width: 200px;
    }
    .out-cta-text strong { color: var(--paper); font-weight: 600; }
    .out-cta-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: 8px;
      background: var(--amber); color: var(--ink);
      font-weight: 700; font-size: 13.5px;
      transition: transform 180ms var(--ease), box-shadow 220ms;
      white-space: nowrap;
    }
    .out-cta-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(232,166,107,0.32); }

    /* Email capture below diagnosis */
    .out-capture {
      margin-top: 22px;
      padding: 18px 18px;
      border: 1px solid rgba(91,192,190,0.28);
      background: linear-gradient(135deg, rgba(91,192,190,0.06), rgba(91,192,190,0.01));
      border-radius: 10px;
    }
    .out-capture-label {
      font-size: 13.5px; color: var(--paper);
      font-weight: 500; margin-bottom: 10px; line-height: 1.5;
    }
    .out-capture-form {
      display: flex; gap: 8px; align-items: stretch;
    }
    .out-capture-form input[type="email"] {
      flex: 1;
      background: rgba(245,239,226,0.05);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: var(--sans); font-size: 14px;
      color: var(--paper);
      outline: none;
      min-width: 0;
      transition: border-color 180ms;
    }
    .out-capture-form input[type="email"]::placeholder { color: var(--t-dim); }
    .out-capture-form input[type="email"]:focus { border-color: var(--cyan); }
    .out-capture-btn {
      padding: 10px 18px; border-radius: 8px;
      background: var(--cyan); color: var(--ink);
      font-weight: 700; font-size: 13.5px;
      transition: transform 180ms var(--ease), box-shadow 220ms;
      white-space: nowrap;
    }
    .out-capture-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(91,192,190,0.32); }
    .out-capture-btn:disabled { opacity: 0.5; cursor: wait; transform: none; box-shadow: none; }
    .out-capture-note {
      margin-top: 10px;
      font-size: 11.5px; color: var(--t-dim);
      line-height: 1.5;
    }
    .out-capture-success {
      margin-top: 22px;
      padding: 18px 18px;
      border: 1px solid rgba(91,192,190,0.40);
      background: rgba(91,192,190,0.10);
      border-radius: 10px;
    }
    @media (max-width: 540px) {
      .out-capture-form { flex-direction: column; }
      .out-capture-btn { width: 100%; }
    }

    .out-thinking {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--mono); font-size: 12px;
      color: var(--t-muted); padding: 6px 0;
    }
    .out-thinking .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--amber); opacity: 0.4;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .out-thinking .dot:nth-child(2) { animation-delay: 0.2s; }
    .out-thinking .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    /* MARQUEE */
    .marquee {
      border-top: 1px solid var(--line-2);
      border-bottom: 1px solid var(--line-2);
      padding: 18px 0;
      overflow: hidden;
      background: rgba(10,14,20,0.6);
      position: relative;
    }
    .marquee-track {
      display: flex; gap: 64px;
      animation: scroll 32s linear infinite;
      width: max-content;
